name: Scrape Dataset Chain

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: scrape-dataset-chain
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    env:
      TARGET_ROWS: "5500"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub requests tqdm pandas jupyter nbconvert

      - name: Verify token
        env:
          GITHUB_TOKEN: ${{ secrets.SCRAPER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "GITHUB_TOKEN is missing"
            exit 1
          fi

      - name: Check current dataset size
        id: progress
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          target = int(os.environ["TARGET_ROWS"])
          path = Path("dataset_quality.jsonl")
          if not path.exists():
            count = 0
          else:
            with path.open("r", encoding="utf-8") as f:
              count = sum(1 for line in f if line.strip())

          done = count >= target
          print(f"Current rows: {count} / target: {target}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
            out.write(f"count={count}\\n")
            out.write(f"done={'true' if done else 'false'}\\n")
          PY

      - name: Execute scraper notebook chunk
        id: scrape_run
        if: steps.progress.outputs.done != 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.SCRAPER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "Starting notebook execution (this can run for hours)."
          python -m jupyter nbconvert \
            --to notebook \
            --execute scrape_notebook.ipynb \
            --output scrape_notebook.executed.ipynb \
            --ExecutePreprocessor.timeout=0 \
            --debug

      - name: Show progress after execution
        if: always() && steps.progress.outputs.done != 'true'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data_path = Path("dataset_quality.jsonl")
          state_path = Path("scrape_state.json")

          if data_path.exists():
            with data_path.open("r", encoding="utf-8") as f:
              rows = sum(1 for line in f if line.strip())
          else:
            rows = 0

          print(f"Rows collected so far: {rows}")

          if state_path.exists():
            try:
              state = json.loads(state_path.read_text(encoding="utf-8"))
              print(
                "State snapshot:",
                {
                  "processed_repos": len(state.get("processed_repos", [])),
                  "written": state.get("written"),
                  "candidate_commits": state.get("candidate_commits"),
                  "commit_errors": state.get("commit_errors"),
                },
              )
            except Exception as exc:
              print(f"Could not parse scrape_state.json: {exc}")
          else:
            print("No scrape_state.json found yet")
          PY

      - name: Commit progress
        if: always() && steps.progress.outputs.done != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dataset_quality.jsonl scrape_state.json

          if git diff --staged --quiet; then
            echo "No progress changes to commit"
            exit 0
          fi

          git commit -m "chore: update scraper progress"
          git pull --rebase origin main
          git push

      - name: Check dataset size after run
        id: post_progress
        if: always() && steps.progress.outputs.done != 'true'
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          target = int(os.environ["TARGET_ROWS"])
          before = int("${{ steps.progress.outputs.count }}")
          path = Path("dataset_quality.jsonl")

          if path.exists():
            with path.open("r", encoding="utf-8") as f:
              after = sum(1 for line in f if line.strip())
          else:
            after = 0

          made_progress = after > before
          done = after >= target

          print(f"Rows before: {before}; after: {after}; target: {target}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
            out.write(f"count={after}\\n")
            out.write(f"done={'true' if done else 'false'}\\n")
            out.write(f"made_progress={'true' if made_progress else 'false'}\\n")
          PY

      - name: Chain next run immediately
        if: always() && steps.progress.outputs.done != 'true' && steps.post_progress.outputs.done != 'true' && steps.post_progress.outputs.made_progress == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.SCRAPER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "Dispatching next workflow run to continue scraping immediately."
          curl -sS -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/scrape-chain.yml/dispatches \
            -d '{"ref":"${{ github.ref_name }}"}'

      - name: Fail if scrape step failed
        if: steps.progress.outputs.done != 'true' && steps.scrape_run.outcome == 'failure'
        run: |
          echo "Scrape execution failed after committing available checkpoints."
          exit 1
